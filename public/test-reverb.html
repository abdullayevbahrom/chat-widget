<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverb WebSocket Test</title>
    <script src="https://cdn.jsdelivr.net/npm/pusher-js@8.4.0-rc2/dist/web/pusher.min.js"></script>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1b4b; color: #fff; }
        #log { background: #0f172a; padding: 15px; border-radius: 8px; max-height: 500px; overflow-y: auto; }
        .log-entry { margin: 5px 0; padding: 5px; border-left: 3px solid #6366f1; padding-left: 10px; }
        .success { border-color: #22c55e; color: #22c55e; }
        .error { border-color: #ef4444; color: #ef4444; }
        .info { border-color: #3b82f6; }
        button { padding: 10px 20px; margin: 10px 5px; background: #6366f1; color: white; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #4f46e5; }
        input { padding: 8px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; width: 300px; }
    </style>
</head>
<body>
    <h1>🔌 Reverb WebSocket Connection Test</h1>
    
    <div>
        <label>Host:</label>
        <input type="text" id="host" value="127.0.0.1"><br>
        <label>Port:</label>
        <input type="text" id="port" value="6001"><br>
        <label>App Key:</label>
        <input type="text" id="appKey" value="7qfgymyozaxetfzc3oxf"><br>
        <label>Channel:</label>
        <input type="text" id="channel" value="test-channel"><br>
        <button onclick="connect()">Connect</button>
        <button onclick="disconnect()">Disconnect</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <div id="log"></div>

    <script>
        let pusher = null;
        let channel = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function connect() {
            const host = document.getElementById('host').value;
            const port = parseInt(document.getElementById('port').value);
            const appKey = document.getElementById('appKey').value;
            const channelName = document.getElementById('channel').value;

            if (pusher) {
                disconnect();
            }

            log(`Connecting to ${host}:${port} with key ${appKey}...`);

            pusher = new Pusher(appKey, {
                wsHost: host,
                wsPort: port,
                wssPort: port,
                forceTLS: false,
                disableStats: true,
                enabledTransports: ['ws', 'wss'],
                cluster: 'mt1',
            });

            channel = pusher.subscribe(channelName);

            channel.bind('pusher:subscription_succeeded', () => {
                log(`✅ Subscribed to channel: ${channelName}`, 'success');
            });

            channel.bind('pusher:subscription_error', (err) => {
                log(`❌ Subscription error: ${JSON.stringify(err)}`, 'error');
            });

            channel.bind('pusher:connection_established', () => {
                log('✅ Connection established!', 'success');
            });

            channel.bind('pusher:error', (err) => {
                log(`❌ Pusher error: ${JSON.stringify(err)}`, 'error');
            });

            pusher.connection.bind('connected', () => {
                log('✅ WebSocket connected', 'success');
            });

            pusher.connection.bind('disconnected', () => {
                log('⚠️ WebSocket disconnected', 'info');
            });

            pusher.connection.bind('error', (err) => {
                log(`❌ Connection error: ${err.message || JSON.stringify(err)}`, 'error');
            });

            pusher.connection.bind('state_change', (states) => {
                log(`🔄 State: ${states.previous} → ${states.current}`, 'info');
            });

            // Test: send test event after 2 seconds
            setTimeout(() => {
                if (pusher && pusher.connection.state === 'connected') {
                    log('📤 Connection test successful - Reverb is working!', 'success');
                }
            }, 2000);
        }

        function disconnect() {
            if (channel) {
                channel.unbind();
                if (pusher) {
                    pusher.unsubscribe(channel);
                }
                channel = null;
            }
            if (pusher) {
                pusher.disconnect();
                pusher = null;
                log('Disconnected', 'info');
            }
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // Auto-connect on load
        window.addEventListener('load', () => {
            log('Page loaded. Click Connect to test Reverb.');
        });
    </script>
</body>
</html>
