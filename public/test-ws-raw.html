<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raw WebSocket Test</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    #log { background: #000; padding: 10px; border-radius: 5px; min-height: 300px; max-height: 500px; overflow-y: auto; }
    .log-entry { margin: 2px 0; }
    .success { color: #4ec9b0; }
    .error { color: #f44747; }
    .info { color: #569cd6; }
    .warn { color: #dcdcaa; }
    button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 3px; }
    button:hover { background: #1177bb; }
    input { padding: 8px; margin: 5px; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; border-radius: 3px; width: 300px; }
  </style>
</head>
<body>
  <h2>Raw WebSocket Test (No Pusher)</h2>
  <div>
    <input type="text" id="wsUrl" placeholder="WebSocket URL" value="wss://widget.marca.uz/app/155536">
    <br>
    <input type="text" id="channelName" placeholder="Channel" value="private-conversation.test-uuid">
    <br>
    <input type="text" id="sessionId" placeholder="Session ID" value="test-session">
    <br>
    <button onclick="connectWS()">Connect WebSocket</button>
    <button onclick="disconnectWS()">Disconnect</button>
  </div>
  <div id="log"></div>

  <script>
    let ws = null;

    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function connectWS() {
      if (ws) {
        log('Already connected. Disconnect first.', 'error');
        return;
      }

      const wsUrl = document.getElementById('wsUrl').value;
      const channelName = document.getElementById('channelName').value;
      const sessionId = document.getElementById('sessionId').value;

      log('🔌 Connecting to: ' + wsUrl, 'info');

      try {
        // Step 1: Get auth signature
        log('📝 Getting auth signature...', 'info');
        const authResponse = await fetch('http://localhost:7080/api/broadcasting/auth', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            channel_name: channelName,
            socket_id: '12345.67890',
            session_id: sessionId,
          }),
        });

        const authData = await authResponse.json();

        if (!authResponse.ok) {
          log('❌ Auth failed: ' + JSON.stringify(authData), 'error');
          return;
        }

        log('✅ Auth successful: ' + authData.auth, 'success');

        // Step 2: Connect WebSocket
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          log('✅ WebSocket connected', 'success');

          // Send ping
          const pingEvent = {
            event: 'pusher:ping',
            data: {},
          };
          ws.send(JSON.stringify(pingEvent));
          log('🏓 Sent ping', 'info');

          // Subscribe to channel with auth
          const subscribeEvent = {
            event: 'pusher:subscribe',
            data: {
              channel: channelName,
              auth: authData.auth,
            },
          };
          ws.send(JSON.stringify(subscribeEvent));
          log('📡 Subscribed to: ' + channelName, 'info');
        };

        ws.onmessage = (event) => {
          try {
            const message = JSON.parse(event.data);
            log('📨 RAW MESSAGE: ' + JSON.stringify(message), 'info');

            if (message.event === 'pusher:pong') {
              log('🏓 Pong received', 'info');
            } else if (message.event === 'pusher_internal:subscription_succeeded') {
              log('✅ Subscription succeeded!', 'success');
            } else if (message.event === '.widget.message-sent' || message.event === 'widget.message-sent') {
              log('📨 widget.message-sent event: ' + JSON.stringify(message.data), 'success');
            } else if (message.event === '.MessageCreated' || message.event === 'MessageCreated') {
              log('📨 MessageCreated event: ' + JSON.stringify(message.data), 'success');
            } else {
              log('🌐 Unknown event: ' + message.event, 'warn');
            }
          } catch (err) {
            log('❌ Parse error: ' + err.message, 'error');
          }
        };

        ws.onerror = (error) => {
          log('❌ WebSocket error: ' + JSON.stringify(error), 'error');
        };

        ws.onclose = (event) => {
          log('🔌 WebSocket closed: ' + event.code + ' ' + event.reason, 'warn');
          ws = null;
        };

      } catch (err) {
        log('❌ Error: ' + err.message, 'error');
      }
    }

    function disconnectWS() {
      if (ws) {
        ws.close();
        ws = null;
        log('Disconnected', 'info');
      }
    }
  </script>
</body>
</html>
