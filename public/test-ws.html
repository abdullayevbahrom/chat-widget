<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket Test</title>
  <script src="https://cdn.jsdelivr.net/npm/pusher-js@8.4.0-rc2/dist/web/pusher.min.js"></script>
  <style>
    body { font-family: monospace; padding: 20px; background: #1e1e1e; color: #d4d4d4; }
    #log { background: #000; padding: 10px; border-radius: 5px; min-height: 300px; max-height: 500px; overflow-y: auto; }
    .log-entry { margin: 2px 0; }
    .success { color: #4ec9b0; }
    .error { color: #f44747; }
    .info { color: #569cd6; }
    button { padding: 10px 20px; margin: 10px 5px; cursor: pointer; background: #0e639c; color: white; border: none; border-radius: 3px; }
    button:hover { background: #1177bb; }
    input { padding: 8px; margin: 5px; background: #3c3c3c; color: #d4d4d4; border: 1px solid #555; border-radius: 3px; }
  </style>
</head>
<body>
  <h2>WebSocket Test Page</h2>
  <div>
    <input type="text" id="sessionId" placeholder="Session ID" value="test-session-123">
    <input type="text" id="channelName" placeholder="Channel" value="private-conversation.test-uuid">
    <button onclick="connectWS()">Connect WebSocket</button>
    <button onclick="disconnectWS()">Disconnect</button>
  </div>
  <div id="log"></div>

  <script>
    let pusher = null;
    let channel = null;

    function log(msg, type = 'info') {
      const logDiv = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function connectWS() {
      const sessionId = document.getElementById('sessionId').value;
      const channelName = document.getElementById('channelName').value;

      if (pusher) {
        log('Already connected. Disconnect first.', 'error');
        return;
      }

      log('Initializing Pusher...', 'info');

      pusher = new Pusher('7qfgymyozazetfzc3oxf', {
        cluster: 'mt1',
        wsHost: 'localhost',
        wsPort: 6001,
        wssPort: 6001,
        forceTLS: false,
        disableStats: true,
        enabledTransports: ['ws', 'wss'],
        path: '/app/155536',
        authEndpoint: 'http://localhost:7080/api/broadcasting/auth',
        auth: {
          headers: {
            'Content-Type': 'application/json',
          },
          params: {
            session_id: sessionId,
          },
        },
      });

      log(`Subscribing to: ${channelName}`, 'info');
      channel = pusher.subscribe(channelName);

      channel.bind('pusher:subscription_succeeded', () => {
        log(`✅ WebSocket subscribed to ${channelName}`, 'success');
      });

      channel.bind('pusher:subscription_error', (err) => {
        log(`❌ Subscription error: ${JSON.stringify(err)}`, 'error');
      });

      channel.bind('.MessageCreated', (data) => {
        log(`📨 MessageCreated event: ${JSON.stringify(data)}`, 'success');
      });

      channel.bind('widget.message-sent', (data) => {
        log(`📨 widget.message-sent event: ${JSON.stringify(data)}`, 'success');
      });

      pusher.connection.bind('connected', () => {
        log('✅ Pusher connected', 'success');
      });

      pusher.connection.bind('disconnected', () => {
        log('Disconnected', 'info');
      });

      pusher.connection.bind('error', (err) => {
        log(`❌ Connection error: ${JSON.stringify(err)}`, 'error');
      });
    }

    function disconnectWS() {
      if (channel) {
        pusher.unsubscribe(channel.name);
        channel = null;
        log('Unsubscribed from channel', 'info');
      }
      if (pusher) {
        pusher.disconnect();
        pusher = null;
        log('Pusher disconnected', 'info');
      }
    }
  </script>
</body>
</html>
