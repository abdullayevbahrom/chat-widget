services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: widget-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ./storage:/var/www/html/storage:delegated
      - ./bootstrap/cache:/var/www/html/bootstrap/cache:delegated
    networks:
      - widget-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-false}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE is required}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME is required}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    secrets:
      - db_password
      - redis_password
    healthcheck:
      test: ["CMD", "pgrep", "php-fpm"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    container_name: widget-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - widget-network
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: widget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql.template:/docker-entrypoint-initdb.d/init.sql.template
      - ./docker/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh
    networks:
      - widget-network
    secrets:
      - db_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required} -d ${DB_DATABASE:?DB_DATABASE is required}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: widget-redis
    restart: unless-stopped
    command: >
      sh -c 'redis-server --requirepass "$$(cat /run/secrets/redis_password)"'
    volumes:
      - redis-data:/data
    networks:
      - widget-network
    secrets:
      - redis_password
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$(cat /run/secrets/redis_password) redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  reverb:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: widget-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:cached
      - /var/www/html/vendor
      - /var/www/html/node_modules
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    ports:
      - "127.0.0.1:6001:6001"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - REVERB_SERVER_HOST=0.0.0.0
      - REVERB_SERVER_PORT=6001
      - REVERB_HOST=localhost
      - REVERB_PORT=6001
      - REVERB_SCHEME=http
      - REVERB_SCALING_ENABLED=true
      - REVERB_SCALING_CHANNEL=reverb
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
    secrets:
      - redis_password
    networks:
      - widget-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6001/up || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  widget-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

secrets:
  db_password:
    file: .secrets/db_password.txt
  redis_password:
    file: .secrets/redis_password.txt
