services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    image: ${IMAGE:-widget-local}
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:rw
      - ./.env:/var/www/html/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
    volumes:
      - .:/var/www/html:delegated
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:?DB_DATABASE is required}
      POSTGRES_USER: ${DB_USERNAME:?DB_USERNAME is required}
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:?DB_USERNAME is required} -d ${DB_DATABASE:?DB_DATABASE is required}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine3.21
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  reverb:
    image: ${IMAGE:-widget-local}
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html:rw
      - ./.env:/var/www/html/.env
    command: php artisan reverb:start --host=0.0.0.0 --port=6001
    ports:
      - "127.0.0.1:6001:6001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:6001/up || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:7081:8080"

volumes:
  db-data:
    driver: local
  redis-data:
    driver: local
